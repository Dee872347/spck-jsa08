<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindX Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .game {
            max-width: 200px;
            border-radius: 15px;
            border-color: red;
            border-style: dashed;
            color: aliceblue;

        }

        .game img {
            max-width: 200px;
        }

        .information {
            display: grid;
            grid-template-columns: auto auto auto;
            grid-template-rows: auto auto;
            gap: 20px;
        }

        body {
            background-color: #1b1d1f;
        }

        .text {
            color: red;
        }

        .container {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            justify-items: center;
        }

        .card-custom {
            width: 100%;
            max-width: 280px;
            border-radius: 15px;
            overflow: hidden;
            background-color: white;
            transition: 0.3s;
        }

        .card-custom img {
            height: 160px;
            object-fit: cover;
        }

        .card-custom:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4);
        }

        .card-body {
            text-align: center;
        }

        .btn-download {
            display: block;
            margin: 10px auto 0;
            width: 120px;
        }
    </style>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <h2 class="navbar-brand">OneGame</h2>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Ai</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Tiện ích
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Đăng xuất</a></li>
                            <li><a class="dropdown-item" href="#">Trợ giúp</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Chia sẻ</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input id="searchInput" class="form-control me-2" type="search" placeholder="Search"
                        aria-label="Search" />
                    <button type="button" onclick="searchMovies()">Search</button>
                </form>
            </div>
        </div>
    </nav>
    <section>
        <div class="container">
            <div class="card-custom">
                <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/271590/header.jpg"
                    class="card-img-top">
                <div class="card-body">
                    <h5>GTA5</h5>
                    <p>Thể loại: Mô phỏng thế giới</p>
                    <p>Đánh giá: ⭐⭐⭐⭐</p>
                    <a href="https://www.rockstargames.com/gta-v" target="_blank"
                        class="btn btn-primary btn-download">Tải game</a>
                </div>
            </div>

            <div class="card-custom">
                <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/730/capsule_616x353.jpg"
                    class="card-img-top">
                <div class="card-body">
                    <h5>CSGO</h5>
                    <p>Thể loại: Bắn súng chiến thuật</p>
                    <p>Đánh giá: ⭐⭐⭐⭐⭐</p>
                    <a href="https://store.steampowered.com/app/730/CounterStrike_2/" target="_blank"
                        class="btn btn-primary btn-download">Tải game</a>
                </div>
            </div>

            <div class="card-custom">
                <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/271590/header.jpg"
                    class="card-img-top">
                <div class="card-body">
                    <h5>Robox</h5>
                    <p>Thể loại: Trò chơi giải trí</p>
                    <p>Đánh giá: ⭐⭐⭐</p>
                    <a href="https://www.rockstargames.com/gta-v" target="_blank"
                        class="btn btn-primary btn-download">Tải game</a>
                </div>
            </div>
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</html>
